<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニューズベース 案件管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:#2563eb; --blue-l:#eff6ff; --blue-t:#1d4ed8;
  --green:#16a34a; --green-l:#f0fdf4; --green-t:#15803d;
  --amber:#d97706; --amber-l:#fffbeb; --amber-t:#b45309;
  --red:#ef4444; --red-l:#fef2f2; --red-t:#b91c1c;
  --purple:#9333ea; --purple-l:#faf5ff; --purple-t:#7e22ce;
  --gray:#6b7280;
  --border:#e5e7eb; --border-l:#f3f4f6;
  --text:#111827; --text2:#6b7280; --text3:#9ca3af;
  --bg:#fff; --bg2:#f9fafb;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.12);
}
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg2); color:var(--text); font-size:14px; min-height:100vh; }

/* ── Header ── */
.header { background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:var(--sh); }
.header-inner { max-width:1400px; margin:0 auto; padding:0 24px; height:56px; display:flex; align-items:center; gap:24px; }
.logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
.logo-mark { width:28px; height:28px; background:var(--blue); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; font-family:'JetBrains Mono',monospace; }
.logo-text { font-size:14px; font-weight:700; color:var(--text); }
.nav { display:flex; height:100%; }
.nav-btn { display:flex; align-items:center; height:100%; padding:0 14px; font-size:13px; color:var(--text2); border:none; border-bottom:2px solid transparent; cursor:pointer; background:none; font-family:'Noto Sans JP',sans-serif; }
.nav-btn:hover { color:var(--text); }
.nav-btn.active { color:var(--blue); font-weight:500; border-bottom-color:var(--blue); }
.header-actions { margin-left:auto; display:flex; align-items:center; gap:8px; }

/* ── Buttons ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; }
.btn-ghost { background:#fff; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--bg2); }
.btn-primary { background:var(--blue); color:#fff; }
.btn-primary:hover { background:#1d4ed8; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── Main 2カラムレイアウト ── */
.main { max-width:1400px; margin:0 auto; padding:20px 24px; }
.two-col { display:grid; grid-template-columns:380px 1fr; gap:16px; align-items:start; }

/* ── 左ペイン（案件リスト） ── */
.list-pane { background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:var(--sh); overflow:hidden; position:sticky; top:76px; max-height:calc(100vh - 96px); display:flex; flex-direction:column; }
.list-hdr { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.list-hdr-title { font-size:13px; font-weight:500; }
.filter-tabs { display:flex; gap:5px; padding:8px 14px; border-bottom:0.5px solid var(--border); flex-shrink:0; }
.ftab { padding:3px 10px; border-radius:20px; border:0.5px solid var(--border); background:transparent; color:var(--text2); font-size:11px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.ftab.on { background:var(--blue-l); border-color:#bfdbfe; color:var(--blue-t); }
.list-search { padding:8px 14px; border-bottom:0.5px solid var(--border); flex-shrink:0; }
.list-search input { width:100%; border:0.5px solid var(--border); border-radius:6px; padding:6px 10px; font-size:12px; font-family:'Noto Sans JP',sans-serif; outline:none; background:var(--bg2); color:var(--text); }
.list-search input:focus { border-color:var(--blue); }
.rows-wrap { overflow-y:auto; flex:1; }
.row { padding:10px 14px; border-bottom:0.5px solid var(--border-l); cursor:pointer; transition:background .1s; }
.row:hover { background:var(--bg2); }
.row.sel { background:var(--blue-l); border-left:3px solid var(--blue); }
.row.lost { opacity:.55; }
.row-name { font-size:12px; font-weight:500; color:var(--text); margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-sub { display:flex; justify-content:space-between; align-items:center; }
.row-client { font-size:10px; color:var(--text3); }

/* ── 右ペイン（詳細） ── */
.detail-pane { background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:var(--sh); overflow:hidden; }
.detail-hdr { padding:16px 20px 12px; border-bottom:1px solid var(--border); }
.detail-project { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; line-height:1.4; }
.detail-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.detail-tabs { display:flex; border-bottom:1px solid var(--border); padding:0 20px; }
.dtab { padding:10px 16px; font-size:13px; cursor:pointer; border:none; background:transparent; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; font-family:'Noto Sans JP',sans-serif; }
.dtab.on { color:var(--blue); font-weight:500; border-bottom-color:var(--blue); }
.detail-body { padding:20px; }
.dpane { display:none; }
.dpane.on { display:block; }

/* ── 概要タブ ── */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.info-lbl { font-size:10px; color:var(--text3); margin-bottom:3px; letter-spacing:.05em; text-transform:uppercase; }
.info-val { font-size:13px; color:var(--text); line-height:1.5; }
.info-val.mono { font-family:'JetBrains Mono',monospace; font-size:12px; }
.biz-box { background:var(--bg2); border-radius:7px; padding:12px 14px; font-size:12px; color:var(--text2); line-height:1.8; white-space:pre-wrap; border:0.5px solid var(--border-l); }

/* ── 依頼事項・確認事項タブ ── */
.item-list { display:flex; flex-direction:column; gap:6px; }
.item { display:flex; align-items:flex-start; gap:10px; padding:8px 12px; border-radius:7px; font-size:12px; line-height:1.6; border:0.5px solid transparent; }
.item.req  { background:var(--blue-l);  border-color:#bfdbfe; color:var(--blue-t); }
.item.pend { background:var(--amber-l); border-color:#fde68a; color:var(--amber-t); }
.item.done { background:var(--green-l); border-color:#bbf7d0; color:var(--green-t); }
.item-icon { font-size:12px; flex-shrink:0; margin-top:2px; }

/* ── メール要約タブ ── */
.sum-box { background:var(--bg2); border-left:3px solid var(--blue); border-radius:0 7px 7px 0; padding:12px 14px; margin-bottom:16px; }
.sum-meta { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
.sum-txt { font-size:13px; color:var(--text2); line-height:1.7; }
.hist-title { font-size:10px; font-weight:600; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.hist-list { display:flex; flex-direction:column; gap:8px; }
.hist-item { display:flex; gap:12px; font-size:12px; }
.hist-date { color:var(--text3); font-family:'JetBrains Mono',monospace; flex-shrink:0; min-width:32px; }
.hist-text { color:var(--text2); line-height:1.5; }

/* ── バッジ共通 ── */
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap; }
.badge::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.badge-blue   { background:var(--blue-l);   color:var(--blue-t);   } .badge-blue::before   { background:var(--blue); }
.badge-green  { background:var(--green-l);  color:var(--green-t);  } .badge-green::before  { background:var(--green); }
.badge-amber  { background:var(--amber-l);  color:var(--amber-t);  } .badge-amber::before  { background:var(--amber); }
.badge-purple { background:var(--purple-l); color:var(--purple-t); } .badge-purple::before { background:var(--purple); }
.badge-red    { background:var(--red-l);    color:var(--red-t);    } .badge-red::before    { background:var(--red); }
.badge-gray   { background:#f3f4f6; color:#374151; border:0.5px solid var(--border); } .badge-gray::before { background:var(--gray); }

/* ── 期限 ── */
.dl { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500; white-space:nowrap; }
.dl.overdue { color:var(--red-t); }
.dl.near    { color:var(--amber-t); font-weight:700; }
.dl.ok      { color:var(--text2); }
.dl.none    { color:var(--text3); }

/* ── 編集モーダル ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:12px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; box-shadow:var(--sh-md); }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; z-index:1; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text3); padding:4px; }
.modal-body { padding:20px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-label { font-size:12px; font-weight:500; color:var(--text2); }
.form-input, .form-select, .form-textarea { border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); outline:none; background:#fff; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--blue); }
.form-textarea { min-height:80px; resize:vertical; }
.form-footer { display:flex; justify-content:flex-end; gap:8px; padding-top:4px; }

/* ── Empty / Toast ── */
.empty { padding:48px 24px; text-align:center; color:var(--text3); }
.toast { position:fixed; bottom:24px; right:24px; background:#111827; color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; z-index:500; display:none; box-shadow:var(--sh-md); }
.toast.show { display:block; animation:fadeup .2s ease; }
@keyframes fadeup { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:1000px) { .two-col { grid-template-columns:320px 1fr; } }
@media(max-width:768px)  { .two-col { grid-template-columns:1fr; } .list-pane { position:static; max-height:300px; } }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">NB</div>
      <span class="logo-text">ニューズベース案件管理</span>
    </a>
    <nav class="nav">
      <button class="nav-btn active" onclick="openEdit(null)">＋ 新規作成</button>
    </nav>
    <div class="header-actions">
      <div id="authArea">
        <button class="btn btn-primary" id="loginBtn" onclick="googleSignIn()" style="display:none">Googleでログイン</button>
        <div id="userInfo" style="display:none;align-items:center;gap:8px">
          <span id="userName" style="font-size:12px;color:var(--text2)"></span>
          <button class="btn btn-ghost" onclick="gmailSync()" id="syncBtn">📩 Gmail同期</button>
          <button class="btn btn-ghost" onclick="googleSignOut()" style="font-size:12px">ログアウト</button>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV出力</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="two-col">

    <!-- 左ペイン：案件リスト -->
    <div class="list-pane">
      <div class="list-hdr">
        <span class="list-hdr-title">案件一覧</span>
        <span style="font-size:11px;color:var(--text3)" id="countLabel"></span>
      </div>
      <div class="filter-tabs">
        <button class="ftab on" onclick="setFilter('all',this)">すべて</button>
        <button class="ftab" onclick="setFilter('active',this)">進行中</button>
        <button class="ftab" onclick="setFilter('lost',this)">失注</button>
      </div>
      <div class="list-search">
        <input type="text" placeholder="検索..." id="listSearch" oninput="renderList()">
      </div>
      <div class="rows-wrap" id="rowsWrap"></div>
    </div>

    <!-- 右ペイン：詳細 -->
    <div class="detail-pane" id="detailPane">
      <div class="detail-hdr">
        <div class="detail-project" id="detailTitle">案件を選択してください</div>
        <div class="detail-meta" id="detailMeta"></div>
      </div>
      <div class="detail-tabs">
        <button class="dtab on" onclick="switchDetailTab('overview',this)">概要</button>
        <button class="dtab" onclick="switchDetailTab('requests',this)">依頼事項</button>
        <button class="dtab" onclick="switchDetailTab('pending',this)">確認事項</button>
        <button class="dtab" onclick="switchDetailTab('summary',this)">メール要約</button>
      </div>
      <div class="detail-body">
        <div class="dpane on" id="dpane-overview">
          <div class="empty">左の一覧から案件を選択してください</div>
        </div>
        <div class="dpane" id="dpane-requests"></div>
        <div class="dpane" id="dpane-pending"></div>
        <div class="dpane" id="dpane-summary"></div>
      </div>
    </div>

  </div>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="closeModalOutside(event,'editModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editTitle">案件を編集</div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body" id="editBody"></div>
  </div>
</div>

<!-- Gmail Sync Modal -->
<div class="modal-overlay" id="syncModal" onclick="closeModalOutside(event,'syncModal')">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <div class="modal-title">Gmail同期 - 案件候補</div>
      <button class="modal-close" onclick="closeModal('syncModal')">✕</button>
    </div>
    <div class="modal-body" id="syncBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// Google Identity Services (OAuth 2.0)
// ─────────────────────────────────────────
const GOOGLE_CLIENT_ID = "433486255319-mhaqmnuvbtilrdus6p0dt5r30eb3bk1e.apps.googleusercontent.com";
const GMAIL_SCOPES = "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email";

let gmailAccessToken = null;
let tokenClient = null;
let currentUser = null;

window.addEventListener('load', () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GMAIL_SCOPES,
    callback: handleTokenResponse,
  });
  document.getElementById('loginBtn').style.display = '';
});

function handleTokenResponse(response) {
  if (response.error) { console.error('OAuth error:', response); return; }
  gmailAccessToken = response.access_token;
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: `Bearer ${gmailAccessToken}` }
  })
  .then(r => r.json())
  .then(user => {
    currentUser = user;
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('userName').textContent = user.name || user.email;
    toast('✓ ログインしました');
  });
}

function googleSignIn() { tokenClient.requestAccessToken(); }

function googleSignOut() {
  if (gmailAccessToken) google.accounts.oauth2.revoke(gmailAccessToken);
  gmailAccessToken = null; currentUser = null;
  document.getElementById('loginBtn').style.display = '';
  document.getElementById('userInfo').style.display = 'none';
  toast('ログアウトしました');
}

// ─────────────────────────────────────────
// Gmail Sync
// ─────────────────────────────────────────
async function getGmailToken() {
  if (gmailAccessToken) return gmailAccessToken;
  return new Promise((resolve, reject) => {
    tokenClient.callback = (response) => {
      if (response.error) { reject(new Error(response.error)); return; }
      gmailAccessToken = response.access_token;
      resolve(gmailAccessToken);
    };
    tokenClient.requestAccessToken();
  });
}

async function gmailSync() {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.disabled = true;
  syncBtn.textContent = '⏳ 同期中...';
  try {
    const token = await getGmailToken();
    const query = encodeURIComponent('from:newsbase.co.jp OR subject:ニューズベース newer_than:60d');
    const listRes = await fetch(
      `https://www.googleapis.com/gmail/v1/users/me/messages?q=${query}&maxResults=20`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!listRes.ok) {
      if (listRes.status === 401) { gmailAccessToken = null; throw new Error('トークンが期限切れです。再度ログインしてください。'); }
      throw new Error('Gmailの取得に失敗しました (HTTP ' + listRes.status + ')');
    }
    const listData = await listRes.json();
    const messageIds = listData.messages || [];
    if (messageIds.length === 0) { toast('新しいメールはありませんでした'); return; }

    const messages = [];
    for (let i = 0; i < messageIds.length; i += 5) {
      const batch = messageIds.slice(i, i + 5);
      const results = await Promise.all(batch.map(async ({ id }) => {
        const res = await fetch(
          `https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=full`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (!res.ok) return null;
        return res.json();
      }));
      messages.push(...results.filter(Boolean));
    }

    const candidates = messages.map(msg => {
      const headers = msg.payload?.headers || [];
      const getHeader = name => (headers.find(h => h.name === name) || {}).value || '';
      const subject = getHeader('Subject');
      const from = getHeader('From');
      const date = getHeader('Date');
      let body = '';
      if (msg.payload?.body?.data) {
        body = atob(msg.payload.body.data.replace(/-/g, '+').replace(/_/g, '/'));
      } else if (msg.payload?.parts) {
        const textPart = msg.payload.parts.find(p => p.mimeType === 'text/plain');
        if (textPart?.body?.data) body = atob(textPart.body.data.replace(/-/g, '+').replace(/_/g, '/'));
      }
      const parsed = parseGmailBody(subject, body, from, date);
      return { threadId: msg.threadId, messageId: msg.id, subject, from, date, body, parsed };
    });

    const existingThreads = new Set(projects.map(p => p.gmailThreadId).filter(Boolean));
    const newCandidates = candidates.filter(c => !existingThreads.has(c.threadId));
    showSyncResults(newCandidates, candidates.length);
  } catch (err) {
    console.error('Gmail sync error:', err);
    toast('⚠ ' + err.message);
  } finally {
    syncBtn.disabled = false;
    syncBtn.textContent = '📩 Gmail同期';
  }
}

function parseGmailBody(subject, body, from, date) {
  const result = { name: '', date: '', venue: '', biz: '', dl: '', requests: [], pending_items: [], latest_summary: '', latest_sender: '', latest_email_date: '' };

  // イベント名
  const namePatterns = [/(?:イベント名|催事名|案件名|件名)[：:]\s*(.+)/, /(?:【(.+?)】)/];
  for (const p of namePatterns) {
    const m = body.match(p) || subject.match(p);
    if (m) { result.name = m[1].trim(); break; }
  }
  if (!result.name && subject) result.name = subject.replace(/^(?:Re:|Fwd:|FW:)\s*/gi, '').trim();

  // 開催日
  const dateMatch = body.match(/(?:開催日|日程|日時)[：:]\s*(.+?)(?:\n|$)/);
  if (dateMatch) result.date = dateMatch[1].trim();

  // 会場
  const venueMatch = body.match(/(?:会場|開催場所|場所|venue)[：:]\s*(.+?)(?:\n|$)/i);
  if (venueMatch) result.venue = venueMatch[1].trim();

  // 業務内容
  const workMatch = body.match(/(?:与件|依頼事項|発注内容|業務内容|依頼内容)[：:]\s*([\s\S]+?)(?:\n\n|\n(?=[^\s]))/);
  if (workMatch) result.biz = workMatch[1].trim();

  // 見積期限
  const dlPatterns = [
    /(?:見積.*?期限|提出期限|回答期限|〆切|締切)[：:]\s*(\d{1,2})[\/月](\d{1,2})[日]?/,
    /(\d{1,2})[\/月](\d{1,2})[日]?\s*まで(?:に|の)/,
  ];
  for (const p of dlPatterns) {
    const m = body.match(p);
    if (m) {
      const month = parseInt(m[1]), day = parseInt(m[2]), year = new Date().getFullYear();
      result.dl = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      break;
    }
  }

  // 依頼事項
  const lines = body.split('\n');
  let inSection = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.match(/[■●▼].*(依頼|お願い|発注|ご確認)/)) inSection = true;
    if (inSection && t.startsWith('・') && t.length > 3) result.requests.push(t.replace(/^・/, '').trim());
    if (t === '' && inSection) inSection = false;
  }
  const extras = body.match(/[^。\n]{5,50}(?:をお願いいたします|いただけますと幸い)/g) || [];
  for (const e of extras.slice(0, 5)) {
    if (!result.requests.includes(e.trim())) result.requests.push(e.trim());
  }

  // 確認事項
  const pendingLines = body.match(/[^。\n]{5,60}(?:未定|確認中|調整中|検討中|お待ち|結果待ち)/g) || [];
  for (const l of pendingLines.slice(0, 6)) result.pending_items.push({ done: false, text: l.trim() });

  // 要約
  const summaryLines = body.split('\n').filter(l => {
    const t = l.trim();
    return t.length > 10 && !t.startsWith('>') && !t.startsWith('--') && !t.includes('@') && !t.includes('〒') && !t.includes('TEL');
  }).slice(0, 6).join(' ');
  result.latest_summary = summaryLines.slice(0, 200);

  // 送信者名・日付
  const senderMatch = from && from.match(/"?([^"<]+)"?\s*</);
  result.latest_sender = senderMatch ? senderMatch[1].trim() : (from || '').split('@')[0];
  try { result.latest_email_date = new Date(date).toISOString().slice(0, 10); } catch(e) {}

  return result;
}

function showSyncResults(candidates, totalFetched) {
  const body = document.getElementById('syncBody');
  if (candidates.length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text2)">
      <p style="font-size:18px;margin-bottom:8px">📭</p>
      <p>${totalFetched}件のメールを確認しましたが、新規案件候補はありませんでした。</p>
      <p style="font-size:12px;margin-top:8px">すでに取り込み済みか、該当メールがありません。</p>
    </div>`;
    document.getElementById('syncModal').classList.add('open');
    return;
  }
  body.innerHTML = `
    <p style="margin-bottom:16px;color:var(--text2)">${totalFetched}件のメールから <strong>${candidates.length}件</strong> の新規案件候補が見つかりました。</p>
    <div id="candidateList">
      ${candidates.map((c, i) => `
        <div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" class="candidate-check" data-index="${i}" checked>
            <strong>${esc(c.parsed.name || c.subject)}</strong>
          </label>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;padding-left:24px">
            From: ${esc(c.from)}
            ${c.parsed.venue ? ' ｜ 会場: ' + esc(c.parsed.venue) : ''}
            ${c.parsed.date  ? ' ｜ 日程: ' + esc(c.parsed.date)  : ''}
            ${c.parsed.dl    ? ' ｜ 期限: ' + esc(c.parsed.dl)    : ''}
          </div>
        </div>`).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('syncModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="importCandidates()">✓ 選択した案件を取り込む</button>
    </div>`;
  window._syncCandidates = candidates;
  document.getElementById('syncModal').classList.add('open');
}

function importCandidates() {
  const checks = document.querySelectorAll('.candidate-check:checked');
  const candidates = window._syncCandidates;
  let imported = 0;
  checks.forEach(chk => {
    const idx = parseInt(chk.dataset.index);
    const c = candidates[idx];
    if (!c) return;
    projects.push({
      id: 'gmail-' + Date.now() + '-' + idx,
      name: c.parsed.name || c.subject,
      client: '', contact: '', date: c.parsed.date || '', prepDate: '',
      venue: c.parsed.venue || '', venueDetail: '',
      biz: c.parsed.biz || '', dl: c.parsed.dl || '', dlNote: '',
      status: '見積依頼受領', estStatus: '未提出',
      note: 'Gmail同期で取り込み（' + new Date().toLocaleDateString('ja-JP') + '）\nスレッドID: ' + c.threadId,
      gmailThreadId: c.threadId,
      requests: c.parsed.requests || [],
      pending_items: c.parsed.pending_items || [],
      latest_summary: c.parsed.latest_summary || '',
      latest_sender: c.parsed.latest_sender || '',
      latest_email_date: c.parsed.latest_email_date || '',
      updatedAt: new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-')
    });
    imported++;
  });
  if (imported > 0) { saveData(); renderList(); }
  closeModal('syncModal');
  toast(`✓ ${imported}件の案件を取り込みました`);
}

function loadData() {
  try {
    const saved = localStorage.getItem('nb_projects');
    if (saved) {
      projects = JSON.parse(saved);
      // 新フィールドのマイグレーション
      projects = projects.map(p => ({
        requests: [], pending_items: [], latest_summary: '', latest_sender: '', latest_email_date: '',
        ...p
      }));
    } else {
      projects = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
    }
  } catch(e) {
    projects = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem('nb_projects', JSON.stringify(projects));
}

const STATUS_MAP = {
  '見積依頼受領':           'badge-blue',
  '見積作成中':             'badge-amber',
  '詳細確認中':             'badge-amber',
  '見積提出済み・引合い中': 'badge-purple',
  '受注済み・準備中':       'badge-green',
  '失注':                   'badge-gray',
};

function dlInfo(dl) {
  if (!dl) return { cls: 'none', label: '—' };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dl);
  const diff = Math.ceil((d - today) / 86400000);
  const label = dl.replace(/-/g, '/').replace('/2026', '').replace('2026/', '');
  if (diff < 0)   return { cls: 'overdue', label: label + '（超過）' };
  if (diff === 0) return { cls: 'near',    label: label + '（本日！）' };
  if (diff <= 7)  return { cls: 'near',    label: label + '（あと' + diff + '日）' };
  return { cls: 'ok', label: label };
}

function fmtDateLong(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
  } catch(e) { return d; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// List

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  const q = (document.getElementById('listSearch')?.value || '').toLowerCase();
  const list = projects.filter(p => {
    const isLost = p.status === '失注';
    if (currentFilter === 'active' && isLost) return false;
    if (currentFilter === 'lost'   && !isLost) return false;
    if (q) {
      const s = ((p.name||'') + (p.client||'') + (p.venue||'')).toLowerCase();
      if (!s.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('countLabel').textContent = list.length + '件';

  const wrap = document.getElementById('rowsWrap');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty">該当する案件がありません</div>';
    return;
  }

  wrap.innerHTML = list.map(p => {
    const sc = STATUS_MAP[p.status] || 'badge-gray';
    const isLost = p.status === '失注';
    return `<div class="row${p.id === currentProjectId ? ' sel' : ''}${isLost ? ' lost' : ''}"
              onclick="selectProject('${esc(p.id)}')">
      <div class="row-name">${esc(p.name || '（案件名不明）')}</div>
      <div class="row-sub">
        <span class="row-client">${esc(p.client||'—')}</span>
        <span class="badge ${sc}" style="font-size:10px;padding:1px 7px">${esc(p.status||'不明')}</span>
      </div>
    </div>`;
  }).join('');
}

function selectProject(id) {
  currentProjectId = id;
  const p = projects.find(x => x.id === id);
  if (!p) return;
  renderList();
  renderDetail(p);
}

  switchDetailTabTo(currentDetailTab);
}

function switchDetailTab(name, btn) {
  currentDetailTab = name;
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  switchDetailTabTo(name);
}

function switchDetailTabTo(name) {
  ['overview','requests','pending','summary'].forEach(t => {
    document.getElementById('dpane-' + t)?.classList.toggle('on', t === name);
  });
}

// ─────────────────────────────────────────
// Edit Modal
// ─────────────────────────────────────────
function openEdit(id) {
  const p = id ? (projects.find(x => x.id === id) || {}) : {};
  document.getElementById('editTitle').textContent = p.id ? '案件を編集' : '新規案件作成';
  renderEditForm(p);
  document.getElementById('editModal').classList.add('open');
}

function renderEditForm(p) {
  const statuses = ['見積依頼受領','見積作成中','詳細確認中','見積提出済み・引合い中','受注済み・準備中','失注'];
  const estStatuses = ['未提出','提出済み','採択','失注'];
  const statusOpts = statuses.map(s => `<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('');
  const estOpts = estStatuses.map(s => `<option value="${s}" ${(p.estStatus||'未提出')===s?'selected':''}>${s}</option>`).join('');

  document.getElementById('editBody').innerHTML = `
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">案件名 *</label>
        <input class="form-input" id="f-name" value="${esc(p.name||'')}" placeholder="例: RSJ Technology Symposium 2026">
      </div>
      <div class="form-group">
        <label class="form-label">エンドクライアント</label>
        <input class="form-input" id="f-client" value="${esc(p.client||'')}" placeholder="例: ローデ・シュワルツ・ジャパン">
      </div>
      <div class="form-group">
        <label class="form-label">NB担当者</label>
        <input class="form-input" id="f-contact" value="${esc(p.contact||'')}" placeholder="例: 瀬津幸太">
      </div>
      <div class="form-group">
        <label class="form-label">開催日</label>
        <input class="form-input" id="f-date" type="date" value="${p.date||''}">
      </div>
      <div class="form-group">
        <label class="form-label">準備日</label>
        <input class="form-input" id="f-prepDate" type="date" value="${p.prepDate||''}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">会場</label>
        <input class="form-input" id="f-venue" value="${esc(p.venue||'')}" placeholder="例: 赤坂インターシティコンファレンス">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">会場詳細・拘束時間</label>
        <input class="form-input" id="f-venueDetail" value="${esc(p.venueDetail||'')}" placeholder="例: 6会場構成、拘束 9:00〜21:00">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">業務内容</label>
        <textarea class="form-textarea" id="f-biz" placeholder="例: 進行D×6・AD×12、収録（カメラ×6）">${esc(p.biz||'')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">見積提出期限</label>
        <input class="form-input" id="f-dl" type="date" value="${p.dl||''}">
      </div>
      <div class="form-group">
        <label class="form-label">見積ステータス</label>
        <select class="form-select" id="f-estStatus">${estOpts}</select>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス *</label>
        <select class="form-select" id="f-status">${statusOpts}</select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">見積備考</label>
        <input class="form-input" id="f-dlNote" value="${esc(p.dlNote||'')}" placeholder="例: 先方提案日 3/27のため24〜25日中に提出">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">メモ・特記事項</label>
        <textarea class="form-textarea" id="f-note" placeholder="社内メモ、特記事項など">${esc(p.note||'')}</textarea>
      </div>
    </div>
    <div class="form-footer">
      ${p.id ? `<button class="btn btn-ghost" style="color:var(--red);border-color:var(--red)" onclick="deleteProject('${esc(p.id)}')">削除</button>` : ''}
      <button class="btn btn-ghost" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit('${esc(p.id||'')}')">保存する</button>
    </div>`;
}

function saveEdit(id) {
  const get = i => document.getElementById(i).value.trim();
  const name = get('f-name');
  if (!name) { alert('案件名は必須です'); return; }
  const now = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');

  if (id) {
    const idx = projects.findIndex(p => p.id === id);
    if (idx >= 0) {
      projects[idx] = { ...projects[idx], name, client: get('f-client'), contact: get('f-contact'),
        date: get('f-date'), prepDate: get('f-prepDate'), venue: get('f-venue'), venueDetail: get('f-venueDetail'),
        biz: get('f-biz'), dl: get('f-dl'), dlNote: get('f-dlNote'),
        status: get('f-status'), estStatus: get('f-estStatus'), note: get('f-note'), updatedAt: now };
    }
  } else {
    const newId = 'proj-' + Date.now();
    projects.push({ id: newId, name, client: get('f-client'), contact: get('f-contact'),
      date: get('f-date'), prepDate: get('f-prepDate'), venue: get('f-venue'), venueDetail: get('f-venueDetail'),
      biz: get('f-biz'), dl: get('f-dl'), dlNote: get('f-dlNote'),
      status: get('f-status'), estStatus: get('f-estStatus'), note: get('f-note'),
      requests: [], pending_items: [], latest_summary: '', latest_sender: '', latest_email_date: '',
      updatedAt: now });
    currentProjectId = newId;
  }

  saveData();
  closeModal('editModal');
  renderList();
  const p = projects.find(x => x.id === (id || currentProjectId));
  if (p) renderDetail(p);
  toast('✓ 保存しました');
}

function deleteProject(id) {
  if (!confirm('この案件を削除しますか？')) return;
  projects = projects.filter(p => p.id !== id);
  if (currentProjectId === id) {
    currentProjectId = null;
    document.getElementById('detailTitle').textContent = '案件を選択してください';
    document.getElementById('detailMeta').innerHTML = '';
    document.getElementById('dpane-overview').innerHTML = '<div class="empty">左の一覧から案件を選択してください</div>';
    ['requests','pending','summary'].forEach(t => { document.getElementById('dpane-'+t).innerHTML = ''; });
  }
  saveData();
  closeModal('editModal');
  renderList();
  toast('削除しました');
}

// ─────────────────────────────────────────
// Modal helpers
// ─────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ─────────────────────────────────────────
// CSV Export
// ─────────────────────────────────────────
function exportCSV() {
  const headers = ['案件名','エンドクライアント','担当者','開催日','準備日','会場','業務内容','見積提出期限','見積ステータス','ステータス','メモ'];
  const rows = projects.map(p => [
    p.name, p.client, p.contact, p.date, p.prepDate, p.venue, p.biz, p.dl, p.estStatus, p.status, p.note
  ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"'));
  const csv = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'newsbase-projects-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('✓ CSVを出力しました');
}

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
loadData();
renderList();
if (projects.length > 0) selectProject(projects[0].id);
</script>
